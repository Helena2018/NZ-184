<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NZ 184 Days PRV Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <div class="version-tag">v5.0</div>
        <h2>1. Target Application Date</h2>
        <p class="instruction">The 2-year eligibility is calculated backward from this date.</p>
        <div class="pill-container">
            <select id="appY" required></select>
            <select id="appM" required></select>
            <select id="appD" required></select>
        </div>
    </div>

    <div class="card">
        <h2>2. Add Overseas Travel</h2>
        <div class="date-label">Departure Date</div>
        <div class="pill-container">
            <select id="depY" required></select>
            <select id="depM" required></select>
            <select id="depD" required></select>
        </div>
        
        <div class="date-label">Return Date</div>
        <div class="pill-container">
            <select id="arrY" required></select>
            <select id="arrM" required></select>
            <select id="arrD" required></select>
        </div>
        <button class="primary-btn" onclick="addTrip()">Add Travel Record</button>
    </div>

    <div id="progressContainer"></div>

    <div class="card">
        <h2>Travel History</h2>
        <div id="tripList"></div>
    </div>

    <div class="clear-wrap">
        <button class="clear-link" onclick="clearData()">Clear All Data</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
