<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>NZ 184 Tracker V4.1-Sorted</title>
    <style>
        :root { --bg: #f4f7f9; --card: #ffffff; --text: #2c3e50; --primary: #3498db; --pass: #27ae60; --fail: #e74c3c; --delete: #e67e22; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; padding-top: env(safe-area-inset-top); }
        .card { background: var(--card); border-radius: 12px; padding: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; }
        h2 { font-size: 16px; margin-top: 0; color: var(--primary); border-bottom: 1px solid #eee; padding-bottom: 8px; display: flex; justify-content: space-between; }
        .ver { font-size: 10px; color: #bdc3c7; font-weight: normal; }
        label { font-size: 12px; color: #7f8c8d; font-weight: bold; display: block; margin-top: 10px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .date-selector {  display: flex;  gap: 5px; margin-top: 8px;  background: #f0f2f5;padding: 5px; border-radius: 10px;}
        .date-selector select { flex: 1;  padding: 10px 5px;  border: none; background: white;border-radius: 6px; font-size: 14px;  outline: none;  -webkit-appearance: none; text-align: center;}
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .days-tag { font-size: 36px; font-weight: bold; text-align: center; margin: 5px 0; }
        .status-box { padding: 10px; border-radius: 6px; text-align: center; font-weight: bold; }
        .pass { background: #e8f5e9; color: var(--pass); }
        .pending { background: #fdf6e3; color: #b58900; }
        .history-item { display: flex; justify-content: space-between; align-items: center; font-size: 12px; padding: 12px 0; border-bottom: 1px dashed #eee; }
        .del-btn { background: var(--delete); padding: 5px 10px; font-size: 10px; border-radius: 4px; width: auto; margin: 0; }
        .edit-btn { background: var(--primary); padding: 5px 10px; font-size: 10px; border-radius: 4px; width: auto; margin: 0; margin-right: 5px; }
        .editing { border: 2px solid var(--primary) !important; background: #ebf5fb !important; }
        .footer-btn { background: #bdc3c7; font-size: 11px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h2>1. Resident Visa Status <span class="ver">v4.1</span></h2>
    <label>Visa Grant Date (Inshore):</label>
    <input type="date" id="visaDate" onchange="saveAndRefresh()">
</div>

<div class="card">
    <h2>2. Add Overseas Travel</h2>
    
    <label>Departure Date</label>
    <div class="date-selector">
        <select id="depY"></select>
        <select id="depM"></select>
        <select id="depD"></select>
    </div>

    <label>Return Date</label>
    <div class="date-selector">
        <select id="arrY"></select>
        <select id="arrM"></select>
        <select id="arrD"></select>
    </div>

    <button onclick="addTrip()">Add Travel Record</button>
</div>

<div id="app-body"></div>

<div class="card">
    <h2>Travel History (Auto-Sorted)</h2>
    <div id="history"></div>
    <button onclick="resetAll()" class="footer-btn">Clear All Data</button>
</div>

<script>
    function initDropdowns() {
      const years = [], months = [], days = [];
      for (let i = 1930; i <= 2050; i++) years.push(i);
      for (let i = 1; i <= 12; i++) months.push(i);
      for (let i = 1; i <= 31; i++) days.push(i);

      const selectors = ['dep', 'arr'];
      selectors.forEach(prefix => {
        document.getElementById(prefix+'Y').innerHTML = years.map(y => `<option value="${y}">${y}Year</option>`).join('');
        document.getElementById(prefix+'M').innerHTML = months.map(m => `<option value="${m < 10 ? '0'+m : m}">${m}Month</option>`).join('');
        document.getElementById(prefix+'D').innerHTML = days.map(d => `<option value="${d < 10 ? '0'+d : d}">${d}Date</option>`).join('');
    });
    }
    initDropdowns();

    let visaDate = localStorage.getItem('nz_visa_date') || "";
    let trips = JSON.parse(localStorage.getItem('nz_trips')) || [];

    if(visaDate) document.getElementById('visaDate').value = visaDate;

    function saveAndRefresh() {
        localStorage.setItem('nz_visa_date', document.getElementById('visaDate').value);
        render();
    }

    function addTrip() {
      const dep = `${document.getElementById('depY').value}-${document.getElementById('depM').value}-${document.getElementById('depD').value}`;
      const arr = `${document.getElementById('arrY').value}-${document.getElementById('arrM').value}-${document.getElementById('arrD').value}`;

      if(new Date(dep) >= new Date(arr)) return alert("Departure must be earlier than return.");

      trips.push({ dep, arr });
      trips.sort((a, b) => new Date(a.dep) - new Date(b.dep));
      localStorage.setItem('nz_trips', JSON.stringify(trips));
      render();
    
      console.log("Trip saved: " + dep + " to " + arr);
    }

    function deleteTrip(index) {
        if(confirm("Delete this trip record?")) {
            trips.splice(index, 1);
            localStorage.setItem('nz_trips', JSON.stringify(trips));
            render();
        }
    }

    function editTrip(index) {
        const trip = trips[index];
    
        // 1. Fill the dates back into inputs
        document.getElementById('depDate').value = trip.dep;
        document.getElementById('arrDate').value = trip.arr;
    
        // 2. Add highlight effect to inputs
        document.getElementById('depDate').classList.add('editing');
        document.getElementById('arrDate').classList.add('editing');
    
        // 3. Remove the item from array (it will be re-added after editing)
        trips.splice(index, 1);
        localStorage.setItem('nz_trips', JSON.stringify(trips));
    
        // 4. Scroll to top for easier editing
        window.scrollTo({ top: 0, behavior: 'smooth' });
    
        render();
    }

    function render() {
        const vStartStr = document.getElementById('visaDate').value;
        if(!vStartStr) return;
        const vStart = new Date(vStartStr);
        const today = new Date();
        today.setHours(23, 59, 59, 999);
        let html = "";

        for(let i=0; i<2; i++) {
            let pStart = new Date(vStart);
            pStart.setFullYear(vStart.getFullYear() + i);
            let pEnd = new Date(pStart);
            pEnd.setDate(pStart.getDate() + 364);

            let daysInNZ = 0;
            if (today >= pStart) {
                let calcEnd = today < pEnd ? today : pEnd;
                let elapsedDays = Math.floor((calcEnd - pStart) / (1000*60*60*24)) + 1;
                let daysAway = 0;
                trips.forEach(t => {
                    let d = new Date(t.dep);
                    let a = new Date(t.arr);
                    let overlapS = d > pStart ? d : pStart;
                    let overlapE = a < calcEnd ? a : calcEnd;
                    if(overlapS < overlapE) {
                        daysAway += Math.floor((overlapE - overlapS) / (1000*60*60*24));
                    }
                });
                daysInNZ = elapsedDays - daysAway;
            }

            let isPass = daysInNZ >= 184;
            html += `<div class="card">
                <h2>Year ${i+1} Progress</h2>
                <div style="font-size:11px; color:#7f8c8d;">${pStart.toDateString()} - ${pEnd.toDateString()}</div>
                <div class="days-tag">${daysInNZ < 0 ? 0 : daysInNZ} <span style="font-size:14px">Days</span></div>
                <div class="status-box ${isPass ? 'pass' : 'pending'}">${isPass ? 'COMPLIANT' : 'IN PROGRESS'}</div>
            </div>`;
        }
        document.getElementById('app-body').innerHTML = html;
        
        document.getElementById('history').innerHTML = trips.map((t, index) => 
    `<div class="history-item">
        <div>🛫 ${t.dep} <br> 🛬 ${t.arr}</div>
        <div style="display: flex;">
            <button class="edit-btn" onclick="editTrip(${index})">Edit</button>
            <button class="del-btn" onclick="deleteTrip(${index})">Delete</button>
        </div>
    </div>`).join('');
    }

    function resetAll() { if(confirm("Clear all data?")) { localStorage.clear(); location.reload(); } }
    render();

    const inputs = document.querySelectorAll('input[type="date"]');
    inputs.forEach(input => {
      input.addEventListener('change', function(){
        console.log("Date captured: ",this.value);
      })
    });
</script>
</body>
</html>
