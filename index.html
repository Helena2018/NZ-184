<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>NZ PRV 184-Day Tracker</title>
    <style>
        :root { --bg: #f4f7f9; --card: #ffffff; --text: #2c3e50; --primary: #3498db; --pass: #27ae60; --fail: #e74c3c; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .card { background: var(--card); border-radius: 12px; padding: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; }
        h2 { font-size: 16px; margin-top: 0; color: var(--primary); border-bottom: 1px solid #eee; padding-bottom: 8px; }
        label { font-size: 12px; color: #7f8c8d; font-weight: bold; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .days-tag { font-size: 32px; font-weight: bold; text-align: center; margin: 10px 0; }
        .status-box { padding: 10px; border-radius: 6px; text-align: center; font-weight: bold; text-transform: uppercase; }
        .pass { background: #e8f5e9; color: var(--pass); }
        .fail { background: #ffebee; color: var(--fail); }
        .history-item { display: flex; justify-content: space-between; font-size: 12px; padding: 10px 0; border-bottom: 1px dashed #eee; }
        .footer-btn { background: #bdc3c7; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h2>1. Resident Visa Status</h2>
    <label>Visa Grant Date (Inshore):</label>
    <input type="date" id="visaDate" onchange="saveAndRefresh()">
    <p style="font-size: 10px; color: #95a5a6;">* Calculation starts from this date by default.</p>
</div>

<div class="card">
    <h2>2. Add Overseas Travel</h2>
    <label>Departure Date:</label>
    <input type="date" id="depDate">
    <label>Return Date:</label>
    <input type="date" id="arrDate">
    <button onclick="addTrip()">Log This Trip</button>
</div>

<div id="app-body"></div>

<div class="card">
    <h2>Travel History</h2>
    <div id="history"></div>
    <button onclick="resetAll()" class="footer-btn">Reset All Data</button>
</div>

<script>
    let visaDate = localStorage.getItem('nz_visa_date') || "";
    let trips = JSON.parse(localStorage.getItem('nz_trips')) || [];

    if(visaDate) document.getElementById('visaDate').value = visaDate;

    function saveAndRefresh() {
        localStorage.setItem('nz_visa_date', document.getElementById('visaDate').value);
        render();
    }

    function addTrip() {
        const dep = document.getElementById('depDate').value;
        const arr = document.getElementById('arrDate').value;
        if(!dep || !arr) return alert("Please fill both dates.");
        trips.push({ dep, arr });
        localStorage.setItem('nz_trips', JSON.stringify(trips));
        render();
    }

    function render() {
        const vStartStr = document.getElementById('visaDate').value;
        if(!vStartStr) return;
        const vStart = new Date(vStartStr);
        let html = "";

        for(let i=0; i<2; i++) {
            let pStart = new Date(vStart);
            pStart.setFullYear(vStart.getFullYear() + i);
            let pEnd = new Date(pStart);
            pEnd.setDate(pStart.getDate() + 364);

            let daysAway = 0;
            trips.forEach(t => {
                let d = new Date(t.dep);
                let a = new Date(t.arr);
                let overlapS = d > pStart ? d : pStart;
                let overlapE = a < pEnd ? a : pEnd;
                if(overlapS < overlapE) {
                    daysAway += Math.floor((overlapE - overlapS)/(1000*60*60*24));
                }
            });

            let totalYearDays = Math.floor((pEnd - pStart)/(1000*60*60*24)) + 1;
            let daysInNZ = totalYearDays - daysAway;
            let isPass = daysInNZ >= 184;

            html += `<div class="card">
                <h2>Year ${i+1} Progress</h2>
                <div style="font-size:11px; color:#7f8c8d;">Period: ${pStart.toDateString()} - ${pEnd.toDateString()}</div>
                <div class="days-tag">${daysInNZ} <span style="font-size:14px">Days</span></div>
                <div class="status-box ${isPass ? 'pass' : 'fail'}">${isPass ? 'COMPLIANT' : 'NON-COMPLIANT'}</div>
            </div>`;
        }
        document.getElementById('app-body').innerHTML = html;
        document.getElementById('history').innerHTML = trips.map(t => 
            `<div class="history-item"><span>🛫 Dep: ${t.dep}</span> <span>🛬 Arr: ${t.arr}</span></div>`).join('');
    }

    function resetAll() { if(confirm("Clear all data?")) { localStorage.clear(); location.reload(); } }
    render();
</script>
</body>
</html>
